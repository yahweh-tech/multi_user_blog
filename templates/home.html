{% extends "base.html" %}

{% block content %}
<h2>Posts</h2>

{% for post in posts %}
    <div>
        <h3>
            <a href="/post/{{ post.id }}/">{{ post.title }}</a>
        </h3>

        <p>By {{ post.author.username }}</p>
        <hr>
    </div>
{% empty %}
    <p>No posts yet.</p>
{% endfor %}
{% endblock %}
